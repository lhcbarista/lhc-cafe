[server]
headless = true
address = "0.0.0.0"
port = 5000
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 10

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
serverPort = 5000

[theme]
primaryColor = "#8B4513"
backgroundColor = "#FAF7F2"
secondaryBackgroundColor = "#F0E8D8"
textColor = "#2C1A0E"
font = "sans serif"

[logger]
level = "error"
